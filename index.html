<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding Invitation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@300;400;500;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/blocks.css">
  <style>
    body { background: var(--sage); }

    /* ===== レイアウト：PC=左サイドバー＋右カード / SP=1カラム ===== */
    .site-wrap { min-height: 100vh; }

    /* SP（既定）: スマホ幅で中央寄せの1カラム。ページ全体が通常スクロール
       （内部スクロールコンテナを作らない＝iOSのスクロール閉じ込めを回避） */
    .site-card {
      max-width: 480px; margin: 0 auto; background: var(--pink); min-height: 100vh;
      position: relative; overflow: visible;
    }
    .site-sidebar { display: none; }

    /* ページ内ナビ（追従バナーとは別。複数ページ時のヘッダタブ） */
    .site-topnav {
      position: sticky; top: 0; z-index: 30;
      display: flex; gap: 4px; padding: 10px 14px;
      background: rgba(236,217,209,0.94); backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(51,51,51,0.08); overflow-x: auto;
    }
    .site-topnav__btn {
      font-family: var(--font-accent); font-size: 12px; letter-spacing: 0.04em;
      padding: 7px 14px; border: 0; border-radius: var(--radius-pill);
      background: transparent; color: var(--ink); cursor: pointer; white-space: nowrap;
    }
    .site-topnav__btn.is-active { background: var(--coral); color: #fff; }
    .site-topnav[hidden] { display: none; }

    /* ===== 追従バナー（栗栖家の方はこちらも） ===== */
    .follow-banner {
      position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%);
      z-index: 40; max-width: 440px; width: calc(100% - 36px);
      display: flex; align-items: center; gap: 10px;
      background: var(--ink); color: #fff; text-decoration: none;
      padding: 13px 18px; border-radius: var(--radius-pill);
      box-shadow: 0 10px 30px rgba(0,0,0,0.22);
      font-size: 13px; line-height: 1.5;
      transition: transform var(--motion) ease, opacity var(--motion) ease;
    }
    .follow-banner__arrow { margin-left: auto; flex: 0 0 auto; opacity: 0.85; }
    .follow-banner[hidden] { display: none; }
    .follow-banner:hover { background: #1f1f1f; }

    .site-loading { padding: 80px 24px; text-align: center; color: var(--muted); font-family: var(--font-accent); }

    /* ===== PC（920px〜）: 左固定サイドバー＋右スマホ幅カード（カード内だけスクロール） ===== */
    @media (min-width: 920px) {
      /* 画面全体は固定。スクロールするのは右カードの中だけ。 */
      html, body { height: 100%; overflow: hidden; }
      .site-wrap {
        display: grid;
        grid-template-columns: 1fr minmax(380px, 460px);
        gap: 40px;
        max-width: 1080px; margin: 0 auto;
        padding: 40px 24px;
        align-items: stretch;
        height: 100vh;
        height: 100dvh;          /* モバイル系PCブラウザのUIバー対策 */
      }
      .site-sidebar {
        display: block;
        align-self: center;       /* 左サイドバーは中央あたりに固定表示 */
      }
      .site-sidebar__inner {
        background: var(--pink); border-radius: var(--radius);
        padding: 36px 30px; text-align: center;
      }
      .sb-names { font-family: var(--font-display); font-size: 22px; font-weight: 500; }
      .sb-date { font-size: 30px; font-weight: 500; letter-spacing: 0.02em; margin-top: 10px; font-family: var(--font-display); }
      .sb-sub { font-size: 13px; color: var(--muted); margin-top: 6px; letter-spacing: 0.08em; }
      .sb-cd { display: flex; justify-content: center; gap: 16px; margin-top: 22px; }
      .sb-cd > div { display: flex; flex-direction: column; }
      .sb-cd b { font-family: var(--font-display); font-size: 26px; font-weight: 500; line-height: 1; }
      .sb-cd i { font-family: var(--font-accent); font-size: 9px; letter-spacing: 0.1em; color: var(--muted); font-style: normal; margin-top: 4px; text-transform: uppercase; }
      .sb-note {
        margin-top: 26px; background: var(--pinkSoft); border-radius: var(--radius);
        padding: 18px; font-size: 12px; color: var(--muted); line-height: 1.9;
      }
      .sb-note u { color: var(--ink); text-underline-offset: 3px; }
      .sb-cta {
        display: block; width: 100%; margin-top: 14px; text-align: center;
        font-family: var(--font-body); font-size: 14px; padding: 13px;
        border: 0; border-radius: var(--radius-pill); background: var(--coral); color: #fff;
        cursor: pointer; text-decoration: none; transition: background var(--motion) ease;
      }
      .sb-cta:hover { background: var(--coral-deep); }

      /* カードは固定高さの内部スクロールコンテナ（参考サイトの「枠の中だけ動く」挙動） */
      .site-card {
        max-width: none; margin: 0; min-height: 0;
        height: 100%;
        overflow-y: auto;
        overflow-x: hidden;
        border-radius: var(--radius); box-shadow: 0 20px 60px rgba(0,0,0,0.12);
        scrollbar-width: thin;
        -webkit-overflow-scrolling: touch;
      }
      .site-card::-webkit-scrollbar { width: 8px; }
      .site-card::-webkit-scrollbar-thumb { background: rgba(51,51,51,0.18); border-radius: 8px; }
      /* topnav はカード内 overflow:auto の中で sticky 固定（カードの上端に貼り付く） */
      .site-topnav { border-radius: var(--radius) var(--radius) 0 0; }
      .follow-banner { left: auto; right: 24px; transform: none; max-width: 320px; }
    }
  </style>
</head>
<body>
  <div class="site-wrap">
    <!-- PC: 左サイドバー -->
    <aside class="site-sidebar" id="sidebar"></aside>

    <!-- スマホ幅カード（本体） -->
    <div class="site-card">
      <nav class="site-topnav" id="topnav" hidden></nav>
      <main class="wb-page" id="site">
        <div class="site-loading">読み込み中…</div>
      </main>
    </div>
  </div>

  <!-- 追従バナー -->
  <a class="follow-banner" id="followBanner" hidden href="#">
    <span id="followText">栗栖家の方はこちらもご確認ください</span>
    <span class="follow-banner__arrow" aria-hidden="true">→</span>
  </a>

  <script src="core/theme.js"></script>
  <script src="core/render.js"></script>
  <script src="core/schema.js"></script>
  <script src="core/storage.js"></script>
  <script src="core/seed.js"></script>
  <script>
    (function () {
      'use strict';
      var WEDI = window.WEDI;
      var site = document.getElementById('site');
      var card = document.querySelector('.site-card');
      var topnav = document.getElementById('topnav');
      var sidebar = document.getElementById('sidebar');
      var banner = document.getElementById('followBanner');
      var followText = document.getElementById('followText');

      /* PC ではカード内スクロール、SP ではウィンドウスクロールを先頭に戻す */
      function scrollToTop() {
        if (card && card.scrollHeight > card.clientHeight + 1) { card.scrollTop = 0; }
        window.scrollTo(0, 0);
      }

      var doc = WEDI.storage.load() || WEDI.seed;
      if (!doc || !doc.pages || !doc.pages.length) {
        site.innerHTML = '<div class="site-loading">まだ内容がありません。エディターで作成してください。</div>';
        return;
      }
      WEDI.theme.applyTheme(document.documentElement, doc.theme);

      var activeId = doc.pages[0].id;
      if (location.hash) {
        var slug = location.hash.slice(1);
        var m = doc.pages.filter(function (p) { return p.slug === slug || p.id === slug; })[0];
        if (m) { activeId = m.id; }
      }

      function pageById(id) {
        return doc.pages.filter(function (p) { return p.id === id; })[0] || doc.pages[0];
      }

      function renderPage(pageId) {
        var page = pageById(pageId);
        site.innerHTML = '';
        var frag = WEDI.render.renderPage(page, doc.theme, { editor: false });
        site.appendChild(frag);
        Array.prototype.forEach.call(site.children, function (sectionEl, i) {
          var block = page.blocks[i];
          if (block) { WEDI.render.hydrate(sectionEl, block); }
        });
        scrollToTop();
      }

      function renderTopnav() {
        if (doc.pages.length <= 1) { topnav.hidden = true; return; }
        topnav.hidden = false;
        topnav.innerHTML = '';
        doc.pages.forEach(function (page) {
          var btn = document.createElement('button');
          btn.className = 'site-topnav__btn' + (page.id === activeId ? ' is-active' : '');
          btn.textContent = page.name || 'Page';
          btn.addEventListener('click', function () { goPage(page.id); });
          topnav.appendChild(btn);
        });
      }

      function goPage(id) {
        activeId = id;
        var page = pageById(id);
        if (page.slug) { history.replaceState(null, '', '#' + page.slug); }
        renderTopnav();
        renderPage(id);
        updateBanner();
      }

      /* ---- 追従バナー: 今表示していない「別ページ」へ誘導 ---- */
      function updateBanner() {
        // 2ページ以上ある時だけ。今が招待状なら「しおり」へ、しおりなら「招待状」へ。
        if (doc.pages.length < 2) { banner.hidden = true; return; }
        var other = doc.pages.filter(function (p) { return p.id !== activeId; })[0];
        if (!other) { banner.hidden = true; return; }
        banner.hidden = false;
        // しおり系のページなら専用文言、それ以外は汎用
        var isGuide = /しおり|guide|旅/.test(other.name + ' ' + other.slug);
        followText.textContent = isGuide
          ? '栗栖家の方はこちらもご確認ください'
          : other.name + ' はこちら';
        banner.onclick = function (ev) { ev.preventDefault(); goPage(other.id); };
      }

      /* ---- PC サイドバー（招待状ページの情報を表示） ---- */
      function renderSidebar() {
        var home = doc.pages[0];
        var cover = home.blocks.filter(function (b) { return b.type === 'cover'; })[0];
        var cd = home.blocks.filter(function (b) { return b.type === 'countdown'; })[0];
        var rsvp = home.blocks.filter(function (b) { return b.type === 'rsvp'; })[0];
        var names = cover ? (cover.data.names || '') : '';
        var date = cover ? (cover.data.date || '') : '';
        var deadline = rsvp ? (rsvp.data.deadline || '') : '';
        var esc = WEDI.render.esc;

        sidebar.innerHTML =
          '<div class="site-sidebar__inner">' +
            (names ? '<p class="sb-names">' + esc(names) + '</p>' : '') +
            (date ? '<p class="sb-date">' + esc(date) + '</p>' : '') +
            '<p class="sb-sub" id="sbSub"></p>' +
            '<div class="sb-cd">' +
              '<div><b data-u="days">―</b><i>days</i></div>' +
              '<div><b data-u="hours">―</b><i>hours</i></div>' +
              '<div><b data-u="minutes">―</b><i>min</i></div>' +
              '<div><b data-u="seconds">―</b><i>sec</i></div>' +
            '</div>' +
            (deadline ? '<div class="sb-note">お手数ではございますが<br><u>' + esc(deadline) + '</u> までに<br>ご一報くださいますようお願いします</div>' : '') +
            '<a class="sb-cta" id="sbCta" href="#">招待状に回答</a>' +
          '</div>';

        // カウントダウン駆動
        if (cd && cd.data.target) {
          var target = new Date(cd.data.target);
          if (!isNaN(target.getTime())) {
            var u = {
              days: sidebar.querySelector('[data-u="days"]'),
              hours: sidebar.querySelector('[data-u="hours"]'),
              minutes: sidebar.querySelector('[data-u="minutes"]'),
              seconds: sidebar.querySelector('[data-u="seconds"]')
            };
            var pad = function (n) { return (n < 10 ? '0' : '') + n; };
            var tick = function () {
              var s = Math.max(0, Math.floor((target.getTime() - Date.now()) / 1000));
              u.days.textContent = Math.floor(s / 86400);
              u.hours.textContent = pad(Math.floor((s % 86400) / 3600));
              u.minutes.textContent = pad(Math.floor((s % 3600) / 60));
              u.seconds.textContent = pad(s % 60);
            };
            tick(); setInterval(tick, 1000);
          }
        }
        // CTA → 招待状ページの RSVP へスクロール
        var cta = sidebar.querySelector('#sbCta');
        if (cta) {
          cta.addEventListener('click', function (ev) {
            ev.preventDefault();
            if (activeId !== doc.pages[0].id) { goPage(doc.pages[0].id); }
            setTimeout(function () {
              var rsvpEl = site.querySelector('[data-type="rsvp"]');
              if (rsvpEl) { rsvpEl.scrollIntoView({ behavior: 'smooth' }); }
            }, 60);
          });
        }
      }

      renderSidebar();
      renderTopnav();
      renderPage(activeId);
      updateBanner();
    })();
  </script>
</body>
</html>
