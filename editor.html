<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>しおりエディター</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=GFS+Didot&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@200;300;400;500;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/blocks.css">
  <link rel="stylesheet" href="css/editor.css">
  <style>
    /* ===== 合言葉ゲート ===== */
    .ed-gate {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      background: var(--pink, #ecd9d1);
      font-family: 'Noto Sans JP', sans-serif;
    }
    .ed-gate[hidden] { display: none; }
    .ed-gate__card {
      width: min(360px, 88vw); background: #fff;
      border-radius: 12px; padding: 36px 28px; text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.14);
    }
    .ed-gate__title { font-family: 'Noto Serif JP', serif; font-size: 20px; margin-bottom: 6px; color: #333; }
    .ed-gate__sub { font-size: 12px; color: #9c9c9c; letter-spacing: 0.1em; margin-bottom: 22px; }
    .ed-gate__input {
      width: 100%; font: inherit; font-size: 15px; padding: 12px 14px;
      border: 1px solid #d9d9d9; border-radius: 8px; text-align: center;
    }
    .ed-gate__input:focus { outline: none; border-color: #ec775b; }
    .ed-gate__btn {
      width: 100%; margin-top: 14px; font: inherit; font-size: 15px; padding: 13px;
      border: 0; border-radius: 40px; background: #ec775b; color: #fff; cursor: pointer;
      transition: background .35s ease;
    }
    .ed-gate__btn:hover { background: #d8623f; }
    .ed-gate__err { color: #c0432a; font-size: 13px; margin-top: 12px; min-height: 1em; }
    /* ゲート未解錠の間はエディター本体を隠す */
    body.is-gated .ed-app, body.is-gated .ed-toast { display: none; }
  </style>
</head>
<body class="editor-body is-gated">

  <!-- 合言葉ゲート -->
  <div class="ed-gate" id="edGate">
    <form class="ed-gate__card" id="edGateForm">
      <p class="ed-gate__title">しおりエディター</p>
      <p class="ed-gate__sub">EDITOR ACCESS</p>
      <input class="ed-gate__input" id="edGateInput" type="password"
             placeholder="合言葉を入力" autocomplete="current-password" autofocus>
      <button class="ed-gate__btn" type="submit">入る</button>
      <p class="ed-gate__err" id="edGateErr" aria-live="polite"></p>
    </form>
  </div>

  <div class="ed-app">
    <!-- トップバー -->
    <header class="ed-topbar">
      <span class="ed-topbar__title" id="appTitle">しおりエディター</span>
      <button class="ed-btn ed-btn--ghost ed-btn--sm" id="undoButton">元に戻す</button>
      <span class="ed-topbar__spacer"></span>
      <span class="ed-topbar__status" id="saveStatus"></span>
      <button class="ed-btn ed-btn--ghost ed-btn--sm" id="previewButton">プレビュー</button>
      <a class="ed-btn ed-btn--ghost ed-btn--sm" id="openFront" href="index.html" target="_blank" rel="noopener">フロントを開く</a>
      <button class="ed-btn ed-btn--primary ed-btn--sm" id="saveButton">保存</button>
    </header>

    <div class="ed-main">
      <!-- 左パネル: ページ + ブロック概要 + パレット -->
      <aside class="ed-panel ed-left">
        <div class="ed-section">
          <div class="ed-section__title">
            <span id="lblPages">ページ</span>
          </div>
          <div class="ed-pages" id="pagesList"></div>
          <button class="ed-btn ed-btn--sm" id="addPageButton" style="margin-top:8px;width:100%;">＋ ページを追加</button>
        </div>

        <div class="ed-section" style="flex:1;">
          <div class="ed-section__title"><span id="lblBlocks">ブロック</span></div>
          <div class="ed-blocklist" id="blockList"></div>
        </div>

        <div class="ed-section">
          <div class="ed-section__title"><span id="lblPalette">パーツ</span></div>
          <div class="ed-palette" id="palette"></div>
        </div>
      </aside>

      <!-- 中央: 実画面プレビュー -->
      <main class="ed-canvas-wrap" id="canvasWrap">
        <div class="ed-canvas is-editing wb-page" id="canvas"></div>
      </main>

      <!-- 右: インスペクタ -->
      <aside class="ed-panel ed-right">
        <div class="ed-inspector" id="inspector"></div>
      </aside>
    </div>
  </div>

  <div class="ed-toast" id="toast"></div>

  <!-- 合言葉ゲート（core より先に。エディター本体は is-gated で隠れている） -->
  <script>
    (function () {
      'use strict';
      // 既定の合言葉は "kurisu2026"。変更方法は README / 下のコメント参照。
      // ハッシュ = SHA-256("合言葉")。別の合言葉にする時はこの値を差し替える。
      var PASSWORD_HASH = '910da0136c05b8f513f7222aa62affcb4c991add8c5dd1812311ae5870f6be31';
      var STORAGE_KEY = 'wedi-editor-access';

      var gate = document.getElementById('edGate');
      var form = document.getElementById('edGateForm');
      var input = document.getElementById('edGateInput');
      var err = document.getElementById('edGateErr');

      async function sha256(text) {
        var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
        return Array.from(new Uint8Array(buf)).map(function (b) {
          return b.toString(16).padStart(2, '0');
        }).join('');
      }

      function unlock() {
        document.body.classList.remove('is-gated');
        gate.hidden = true;
      }

      // 既に解錠済みなら素通り
      if (localStorage.getItem(STORAGE_KEY) === PASSWORD_HASH) {
        unlock();
      } else {
        setTimeout(function () { input.focus(); }, 50);
      }

      form.addEventListener('submit', async function (ev) {
        ev.preventDefault();
        err.textContent = '';
        var h = await sha256((input.value || '').trim());
        if (h === PASSWORD_HASH) {
          localStorage.setItem(STORAGE_KEY, PASSWORD_HASH);
          unlock();
          form.reset();
        } else {
          err.textContent = '合言葉が違います。';
          input.select();
        }
      });
    })();
  </script>

  <!-- 画像アップロード用 Supabase クライアント（任意・読めなければアップロード無効化） -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- core（フロントと共有） -->
  <script src="core/theme.js"></script>
  <script src="core/render.js"></script>
  <script src="core/schema.js"></script>
  <script src="core/storage.js"></script>
  <script src="core/upload.js"></script>
  <script src="core/i18n.js"></script>
  <script src="core/seed.js"></script>
  <!-- editor 専用 -->
  <script src="editor/inspector.js"></script>
  <script src="editor/palette.js"></script>
  <script src="editor/drag.js"></script>
  <script src="editor/editor.js"></script>
</body>
</html>
